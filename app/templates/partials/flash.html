{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <ul class="flash-messages" role="alert">
    {% for category, message in messages %}
    <li class="flash flash--{{ category }}">
      <span class="flash__icon">
        {% if category == 'success' %}
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>
        {% elif category == 'danger' %}
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
        {% else %}
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        {% endif %}
      </span>
      {{ message }}
    </li>
    {% endfor %}
  </ul>
  {% endif %}
{% endwith %}
